name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Test Sublime Text package
        run: |
          python -m unittest discover -s st4/tests
          python -m py_compile st4/md_toc.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode/package-lock.json
      - name: Test VS Code extension
        working-directory: vscode
        run: |
          npm ci
          npm run check
          npm run package -- --out markdown-toc.vsix
